services:

  nginx:
    image: nginx:stable-alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - n8n
      - evolution-api
    

  # --- evolution API para correr Whatsapp ---
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution_api
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - postgres_db
      - redis_db
    volumes:
      - evolution_sessions:/usr/src/app/sessions

  # --- Base de datos principal de evolution-api para correr y persistir ---
  postgres_db:
    image: pgvector/pgvector:pg15
    container_name: evolution_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evolution

    volumes:
      - evolution_postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  # --- REDIS CON CAPACIDAD VECTORIAL (Compartido para Evolution API y n8n Vector Store) ---
  redis_db:
    image: redis/redis-stack-server:7.2.0-v8
    container_name: evolution_redis
    restart: unless-stopped
    environment:
      - REDIS_ARGS=--protected-mode no
    volumes:
      - evolution_redis:/data

  # --- n8n automatizacion ---
  n8n:
    image: n8nio/n8n:2.25.5
    container_name: n8n_server
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto  #nueva
      - NODE_FUNCTION_ALLOW_EXTERNAL=crypto #nueva 
      - N8N_SECURE_COOKIE=false
      - N8N_HOST=n8n.brayan.co
      - N8N_PROXY_HOPS=1
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_EDITOR_BASE_URL=http://n8n.brayan.co
      - WEBHOOK_URL=http://n8n.brayan.co
      - GENERIC_TIMEZONE=America/Bogota
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - evolution-api
      - redis_db # Asegura que n8n espere a que el almacén de vectores esté listo

volumes:
  evolution_postgres:
  evolution_redis:
  evolution_sessions:
  n8n_data: